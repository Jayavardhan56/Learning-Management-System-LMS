version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lms_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-lms_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../server/database.sql:/docker-entrypoint-initdb.d/init.sql

  server:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.server
    container_name: lms_server
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-lms_db}
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-shnoor_secret_key_2026}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
    depends_on:
      - db
    volumes:
      - ../server/uploads:/app/uploads

  client:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.client
    container_name: lms_client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data:
